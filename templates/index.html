<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gespoint</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>
body{
  margin:0;
  font-family: 'Inter', sans-serif;
  display:flex;
  height:100vh;
}

.sidebar{
  width:200px;
  background:#111827;
  color:white;
  padding:20px;
}

.sidebar h2{
  margin-bottom:20px;
}

.sidebar button{
  width:100%;
  margin-bottom:10px;
  padding:10px;
  border:none;
  background:#3b82f6;
  color:white;
  border-radius:6px;
  cursor:pointer;
}

.main{
  flex:1;
  display:flex;
  flex-direction:column;
}

.topbar{
  height:60px;
  background:#f9fafb;
  display:flex;
  align-items:center;
  padding:0 20px;
  border-bottom:1px solid #ddd;
}

#map{
  flex:1;
}
</style>
</head>

<body>

<div class="sidebar">
  <h2>📍 Gespoint</h2>

  <button onclick="window.location.href='/empleados/'">
  Ver empleados
</button>
  <button onclick="cargarUbicaciones()">Ver ubicaciones</button>
  <button onclick="obtenerUbicacion()">📡 Mi ubicación</button>

  <ul id="empleados"></ul>
</div>

<div class="main">
  <div class="topbar">
    <h3>Home</h3>
  </div>

  <div id="map"></div>
</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>
const API = "http://127.0.0.1:8000";

// MAPA
const map = L.map('map').setView([32.5, -116.9], 12);

// CAPA BONITA (la que ya arreglaste)
L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
    attribution: '&copy; OpenStreetMap &copy; CartoDB',
    subdomains: 'abcd',
    maxZoom: 19
}).addTo(map);

// 🔥 IMPORTANTE
let markers = [];

// CARGAR EMPLEADOS
function irEmpleados(){
    window.location.href = "/empleados/";
}

// CARGAR UBICACIONES
async function cargarUbicaciones() {
    console.log("CLICK en ubicaciones"); // 👈 DEBUG

    const res = await fetch(`${API}/api/ubicaciones/`);
    const data = await res.json();

    console.log(data); // 👈 VER SI LLEGA INFO

    markers.forEach(m => map.removeLayer(m));
    markers = [];

    data.forEach(u => {
        const marker = L.marker([u.latitud, u.longitud])
            .addTo(map)
            .bindPopup(`
                <b>${u.empleado}</b><br>
                ${u.fecha}
            `);

        markers.push(marker);
    });
}

// UBICACIÓN ACTUAL
function obtenerUbicacion() {
    navigator.geolocation.getCurrentPosition(pos => {
        const lat = pos.coords.latitude;
        const lng = pos.coords.longitude;

        L.marker([lat, lng])
          .addTo(map)
          .bindPopup("📍 Mi ubicación")
          .openPopup();

        map.setView([lat, lng], 13);
    });
}
</script>

</body>
</html>
