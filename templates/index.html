<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gespoint</title>

<!-- Google Font -->
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

<!-- Leaflet CSS -->
<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family: 'Inter', sans-serif;
}

body{
  display:flex;
  height:100vh;
  background:#f4f6f9;
}

/* SIDEBAR */
.sidebar{
  width:250px;
  background:white;
  padding:25px 20px;
  display:flex;
  flex-direction:column;
  justify-content:space-between;
  border-right:1px solid #e5e7eb;
}

.logo{
  font-size:20px;
  font-weight:600;
  margin-bottom:40px;
}

.sidebar nav a{
  display:block;
  padding:12px;
  margin-bottom:8px;
  text-decoration:none;
  color:#555;
  border-radius:8px;
  transition:.2s;
}

.sidebar nav a:hover{
  background:#f0f3ff;
  color:#3b82f6;
}

.sidebar nav a.active{
  background:#e0e7ff;
  color:#3b82f6;
  font-weight:600;
}

.logout{
  background:none;
  border:none;
  color:#777;
  cursor:pointer;
  padding:10px;
  text-align:left;
}

/* MAIN */
.main{
  flex:1;
  display:flex;
  flex-direction:column;
}

/* TOPBAR */
.topbar{
  height:70px;
  background:white;
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:0 30px;
  border-bottom:1px solid #e5e7eb;
}

.search{
  width:400px;
  padding:10px 15px;
  border-radius:25px;
  border:1px solid #ddd;
  outline:none;
  background:#f9fafb;
}

.user{
  display:flex;
  align-items:center;
  gap:10px;
  font-weight:500;
}

/* MAP */
#map{
  flex:1;
}

/* MAP CONTROLS */
.map-controls{
  position:absolute;
  bottom:30px;
  right:30px;
  display:flex;
  gap:15px;
}

.map-controls button{
  width:45px;
  height:45px;
  border-radius:50%;
  border:none;
  background:white;
  font-size:18px;
  cursor:pointer;
  box-shadow:0 4px 10px rgba(0,0,0,0.1);
  transition:.2s;
}

.map-controls button:hover{
  transform:scale(1.1);
}

/* RESPONSIVE */
@media(max-width:900px){
  .sidebar{
    width:200px;
  }
  .search{
    width:200px;
  }
}

</style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">
  <div>
    <div class="logo">📍 Gespoint</div>
    <nav>
      <a href="#" class="active">Home</a>
      <a href="#">Mi ubicación</a>
      <a href="#">Historial</a>
      <a href="#">Casa</a>
      <a href="#">Favoritos</a>
    </nav>
  </div>
  <button class="logout">Salir</button>
</div>

<!-- MAIN -->
<div class="main">

  <div class="topbar">
    <input type="text" class="search" placeholder="Buscar ubicación...">
    <div class="user">👤 Mi Perfil</div>
  </div>

  <div id="map"></div>

  <div class="map-controls">
    <button onclick="map.zoomIn()">+</button>
    <button onclick="map.zoomOut()">−</button>
  </div>

</div>

<!-- Leaflet JS -->
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>
var map = L.map('map').setView([32.6245, -115.4523], 14);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  attribution: '&copy; OpenStreetMap contributors'
}).addTo(map);

L.marker([32.499944, -116.9306264]).addTo(map)
  .bindPopup('Ubicación actual')
  .openPopup();
</script>

</body>
</html>
